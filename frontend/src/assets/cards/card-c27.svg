<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 170" width="120" height="170">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E2010"/>
      <stop offset="100%" stop-color="#1C0D05"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B3A1F"/>
      <stop offset="100%" stop-color="#1C0D05"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="2" y="2" width="116" height="166" rx="10" ry="10"/>
    </clipPath>
    <pattern id="pat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M0 10 L10 0 L20 10 L10 20 Z" fill="none" stroke="#5C2E0E" stroke-width="0.5" opacity="0.6"/>
      </pattern>
  </defs>

  <!-- Fond principal -->
  <rect x="2" y="2" width="116" height="166" rx="10" fill="url(#bg)" clip-path="url(#cardClip)"/>
  <rect x="2" y="2" width="116" height="166" rx="10" fill="url(#pat)" clip-path="url(#cardClip)"/>
  <rect x="2" y="2" width="116" height="166" rx="10" fill="url(#shimmer)" clip-path="url(#cardClip)"/>

  <!-- Bordure extérieure double -->
  <rect x="1" y="1" width="118" height="168" rx="11" fill="none" stroke="#A0522D" stroke-width="2.5"/>
  <rect x="4" y="4" width="112" height="162" rx="8" fill="none" stroke="#D2691E" stroke-width="0.8" opacity="0.5"/>

  <!-- Ornements coins -->
  <circle cx="12" cy="12" r="5" fill="#CD853F" opacity="0.6"/>
  <circle cx="108" cy="12" r="5" fill="#CD853F" opacity="0.6"/>
  <circle cx="12" cy="158" r="5" fill="#CD853F" opacity="0.6"/>
  <circle cx="108" cy="158" r="5" fill="#CD853F" opacity="0.6"/>
  <path d="M7 12 L12 7 M108 7 L113 12 M7 158 L12 163 M113 158 L108 163" stroke="#D2691E" stroke-width="1" opacity="0.6"/>

  <!-- Zone icône -->
  <rect x="30" y="18" width="60" height="58" rx="6" fill="rgba(0,0,0,0.35)"/>
  <rect x="30" y="18" width="60" height="58" rx="6" fill="none" stroke="#A0522D" stroke-width="1" opacity="0.6"/>
  <g clip-path="url(#cardClip)" transform="translate(0, 5)">
    <path d="M60 25 L75 45 L60 65 L45 45 Z" fill="#CD853F" opacity="0.8"/>
    <path d="M60 30 L72 45 L60 60 L48 45 Z" fill="#A0522D" opacity="0.6"/>
    <circle cx="60" cy="45" r="8" fill="#FFD9B0" opacity="0.9"/>
  </g>

  <!-- Bandeau nom -->
  <rect x="6" y="80" width="108" height="20" rx="4" fill="url(#banner)"/>
  <rect x="6" y="80" width="108" height="20" rx="4" fill="none" stroke="#A0522D" stroke-width="0.8" opacity="0.5"/>
  <text x="60" y="93" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-weight="bold" fill="#FFD9B0" letter-spacing="0.5">CARRIÈRE</text>

  <!-- Zone coût -->
  <text x="60" y="82" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#CD853F" opacity="0.8" letter-spacing="1">COÛT</text>
  <circle cx="54.5" cy="87" r="5" fill="#FFD700" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text x="54.5" y="90" text-anchor="middle" font-size="5.5" fill="white">◉</text>
<circle cx="65.5" cy="87" r="5" fill="#FFD700" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text x="65.5" y="90" text-anchor="middle" font-size="5.5" fill="white">◉</text>

  <!-- Séparateur -->
  <line x1="15" y1="100" x2="105" y2="100" stroke="#A0522D" stroke-width="0.8" opacity="0.6"/>

  <!-- Zone effet -->
  <rect x="8" y="102" width="104" height="50" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="60" y="108" text-anchor="middle" font-family="Georgia,serif" font-size="7.5" fill="white" font-weight="bold">+2 🪨</text>

  <!-- Badge type bas -->
  <rect x="22" y="154" width="76" height="12" rx="5" fill="#6B3A1F"/>
  <rect x="22" y="154" width="76" height="12" rx="5" fill="none" stroke="#A0522D" stroke-width="0.8"/>
  <text x="60" y="163" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="bold" fill="#FFD9B0" letter-spacing="1.5">RESSOURCE</text>

  <!-- Âge indicator -->
  <text x="60" y="148" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#CD853F" opacity="0.7">ÂGE 2</text>
</svg>