<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 170" width="120" height="170">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C0A0A"/>
      <stop offset="100%" stop-color="#2A0404"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A1010"/>
      <stop offset="100%" stop-color="#2A0404"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="2" y="2" width="116" height="166" rx="10" ry="10"/>
    </clipPath>
    <pattern id="pat" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
        <path d="M0 0 L16 16 M16 0 L0 16" stroke="#3A0808" stroke-width="0.5" opacity="0.5"/>
      </pattern>
  </defs>

  <!-- Fond principal -->
  <rect x="2" y="2" width="116" height="166" rx="10" fill="url(#bg)" clip-path="url(#cardClip)"/>
  <rect x="2" y="2" width="116" height="166" rx="10" fill="url(#pat)" clip-path="url(#cardClip)"/>
  <rect x="2" y="2" width="116" height="166" rx="10" fill="url(#shimmer)" clip-path="url(#cardClip)"/>

  <!-- Bordure extérieure double -->
  <rect x="1" y="1" width="118" height="168" rx="11" fill="none" stroke="#CC2020" stroke-width="2.5"/>
  <rect x="4" y="4" width="112" height="162" rx="8" fill="none" stroke="#FF5050" stroke-width="0.8" opacity="0.5"/>

  <!-- Ornements coins -->
  <circle cx="12" cy="12" r="5" fill="#E03030" opacity="0.6"/>
  <circle cx="108" cy="12" r="5" fill="#E03030" opacity="0.6"/>
  <circle cx="12" cy="158" r="5" fill="#E03030" opacity="0.6"/>
  <circle cx="108" cy="158" r="5" fill="#E03030" opacity="0.6"/>
  <path d="M7 12 L12 7 M108 7 L113 12 M7 158 L12 163 M113 158 L108 163" stroke="#FF5050" stroke-width="1" opacity="0.6"/>

  <!-- Zone icône -->
  <rect x="30" y="18" width="60" height="58" rx="6" fill="rgba(0,0,0,0.35)"/>
  <rect x="30" y="18" width="60" height="58" rx="6" fill="none" stroke="#CC2020" stroke-width="1" opacity="0.6"/>
  <g clip-path="url(#cardClip)" transform="translate(0, 5)">
    <path d="M60 20 L65 38 L80 38 L68 49 L73 67 L60 57 L47 67 L52 49 L40 38 L55 38 Z" fill="#E03030" stroke="#FF5050" stroke-width="1.5"/>
  </g>

  <!-- Bandeau nom -->
  <rect x="6" y="80" width="108" height="20" rx="4" fill="url(#banner)"/>
  <rect x="6" y="80" width="108" height="20" rx="4" fill="none" stroke="#CC2020" stroke-width="0.8" opacity="0.5"/>
  <text x="60" y="93" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-weight="bold" fill="#FFD0D0" letter-spacing="0.5">CASTRUM</text>

  <!-- Zone coût -->
  <text x="60" y="82" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#E03030" opacity="0.8" letter-spacing="1">COÛT</text>
  <circle cx="43.5" cy="87" r="5" fill="#D2691E" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text x="43.5" y="90" text-anchor="middle" font-size="5.5" fill="white">🧱</text>
<circle cx="54.5" cy="87" r="5" fill="#D2691E" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text x="54.5" y="90" text-anchor="middle" font-size="5.5" fill="white">🧱</text>
<circle cx="65.5" cy="87" r="5" fill="#D2691E" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text x="65.5" y="90" text-anchor="middle" font-size="5.5" fill="white">🧱</text>
<circle cx="76.5" cy="87" r="5" fill="#AB47BC" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text x="76.5" y="90" text-anchor="middle" font-size="5.5" fill="white">❋</text>

  <!-- Séparateur -->
  <line x1="15" y1="100" x2="105" y2="100" stroke="#CC2020" stroke-width="0.8" opacity="0.6"/>

  <!-- Zone effet -->
  <rect x="8" y="102" width="104" height="50" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="60" y="108" text-anchor="middle" font-family="Georgia,serif" font-size="7.5" fill="white" font-weight="bold">+3 ⚔</text>

  <!-- Badge type bas -->
  <rect x="22" y="154" width="76" height="12" rx="5" fill="#7A1010"/>
  <rect x="22" y="154" width="76" height="12" rx="5" fill="none" stroke="#CC2020" stroke-width="0.8"/>
  <text x="60" y="163" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="bold" fill="#FFD0D0" letter-spacing="1.5">MILITAIRE</text>

  <!-- Âge indicator -->
  <text x="60" y="148" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#E03030" opacity="0.7">ÂGE 3</text>
</svg>